{% extends "base.html" %}
{% block title %}Error {{ code }} · PSMS{% endblock %}
{% block page_title %}Error{% endblock %}
{% block content %}
<div class="text-center py-5">
    <h1 class="display-3 text-danger">{{ code }}</h1>
    <p class="lead">{{ message }}</p>
    <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary mt-2">
        Go back
    </a>
</div>
{% endblock %}
{% block guest_content %}
<div class="login-wrapper">
    <div class="login-card text-center">
        <h1 class="display-4 text-danger">{{ code }}</h1>
        <p class="lead">{{ message }}</p>
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary mt-2">Go to Login</a>
    </div>
</div>
{% endblock %}
